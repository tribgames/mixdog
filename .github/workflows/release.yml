# Tag-triggered release pipeline. The version bump happens LOCALLY (by the
# maintainer), never in CI — so CI never writes a commit to origin/main and
# the local clone never diverges from origin. Cut a release locally with:
#   npm run release:patch      (or release:minor / release:major)
# which runs smoke, bumps package.json + commits + tags, and pushes the
# commit and tag. Pushing the `v*` tag triggers THIS workflow, which validates
# the exact release tag, verifies, and publishes — it does not touch git history.
#
# Flow (CI): checkout tag -> validate tag/version -> ci + build + focused gates
# + smoke -> npm publish -> GitHub release. Local `npm publish` stays blocked by
# the prepublishOnly guard in package.json — this workflow is the only publish
# path.
# Requires the NPM_TOKEN repo secret (npm automation token).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # version commit, tag push, release creation
  id-token: write # npm --provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify release tag matches package version
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';

          const tag = process.env.GITHUB_REF_NAME || '';
          const { version } = JSON.parse(await readFile('package.json', 'utf8'));
          const coreVersion = '(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)';
          if (!new RegExp(`^${coreVersion}$`).test(version)) {
            throw new Error(`package.json version is not strict MAJOR.MINOR.PATCH: ${version}`);
          }
          if (!new RegExp(`^v${coreVersion}$`).test(tag)) {
            throw new Error(`Release tag is not strict vMAJOR.MINOR.PATCH: ${tag}`);
          }
          if (tag !== `v${version}`) {
            throw new Error(`Release tag ${tag} does not match package.json version ${version}`);
          }
          console.log(`Verified release identity ${tag}.`);
          NODE

      # Validate every bundled native manifest before install or publish.
      - name: Verify bundled release assets
        run: node scripts/verify-release-assets.mjs

      - name: Install
        run: npm ci

      # Smoke's routing corpus exercises the real grep tool, which shells out
      # to ripgrep; the ubuntu runner image does not ship rg by default.
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      # src/tui/dist is gitignored; smoke imports it. prepack rebuilds it
      # again at publish time, but the smoke gate needs it present first.
      - name: Build TUI
        run: npm run build:tui

      - name: Execute code graph from a clean cache
        run: npm run test:code-graph-clean-cache

      - name: Focused release regressions
        run: npm run test:release-focused

      - name: Smoke
        run: npm run smoke

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CI: "true"
          # Shipping intent, explicit at the publish boundary. Runtime default
          # already ships (no .git in a published install); this documents it.
          MIXDOG_MODE: "ship"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true
