# Tag-triggered release pipeline. The version bump happens LOCALLY (by the
# maintainer), never in CI — so CI never writes a commit to origin/main and
# the local clone never diverges from origin. Cut a release locally with:
#   npm run release:patch      (or release:minor / release:major)
# which runs smoke, bumps package.json + commits + tags, and pushes the
# commit and tag. Pushing the `v*` tag triggers THIS workflow, which only
# verifies and publishes — it does not touch git history.
#
# Flow (CI): checkout tag -> ci + build + smoke -> npm publish -> GitHub
# release. Local `npm publish` stays blocked by the prepublishOnly guard in
# package.json — this workflow is the only publish path.
# Requires the NPM_TOKEN repo secret (npm automation token).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # version commit, tag push, release creation
  id-token: write # npm --provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      # src/tui/dist is gitignored; smoke imports it. prepack rebuilds it
      # again at publish time, but the smoke gate needs it present first.
      - name: Build TUI
        run: npm run build:tui

      - name: Smoke
        run: npm run smoke

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CI: "true"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
