name: Runtime Assets Health

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: runtime-assets-health
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check bundled runtime assets
        id: verify
        continue-on-error: true
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';

          const manifestPath = 'src/runtime/memory/data/runtime-manifest.json';
          const failures = [];
          let manifest = {};
          try {
            manifest = JSON.parse(await readFile(manifestPath, 'utf8'));
          } catch (error) {
            failures.push(`Manifest could not be read: ${error.message}`);
          }
          const assets = Object.entries(manifest.assets ?? {});

          if (!manifest.release_tag) failures.push('Manifest has no release_tag.');
          if (assets.length === 0) failures.push('Manifest has no assets.');

          async function probe(platform, asset) {
            if (typeof asset?.url !== 'string' || new URL(asset.url).protocol !== 'https:') {
              throw new Error('invalid HTTPS URL');
            }
            if (!Number.isSafeInteger(asset.size) || asset.size <= 0) {
              throw new Error(`invalid declared size: ${asset.size}`);
            }

            const response = await fetch(asset.url, {
              headers: {
                Range: 'bytes=0-0',
                'User-Agent': 'mixdog-runtime-assets-health',
              },
              redirect: 'follow',
              signal: AbortSignal.timeout(30_000),
            });

            if (!response.ok) {
              await response.body?.cancel();
              throw new Error(`HTTP ${response.status}`);
            }

            const contentRange = response.headers.get('content-range');
            const contentLength = response.headers.get('content-length');
            const remoteSize = contentRange
              ? Number(contentRange.match(/\/(\d+)$/)?.[1])
              : Number(contentLength);
            await response.body?.cancel();

            if (!Number.isSafeInteger(remoteSize) || remoteSize <= 0) {
              throw new Error('response did not report total asset size');
            }
            if (remoteSize !== asset.size) {
              throw new Error(`size mismatch: manifest=${asset.size}, remote=${remoteSize}`);
            }
            console.log(`${platform}: OK (${remoteSize} bytes)`);
          }

          for (const [platform, asset] of assets) {
            let lastError;
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                await probe(platform, asset);
                lastError = undefined;
                break;
              } catch (error) {
                lastError = error;
                if (attempt < 3) await new Promise(resolve => setTimeout(resolve, attempt * 2_000));
              }
            }
            if (lastError) failures.push(`${platform}: ${lastError.message} (${asset?.url ?? 'no URL'})`);
          }

          if (failures.length > 0) {
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const report = [
              '# Runtime release asset health check failed',
              '',
              `Manifest: \`${manifestPath}\``,
              `Release tag: \`${manifest.release_tag ?? 'missing'}\``,
              `Checked: ${new Date().toISOString()}`,
              `Workflow run: ${runUrl}`,
              '',
              ...failures.map(failure => `- ${failure}`),
              '',
            ].join('\n');
            await writeFile('runtime-assets-health-report.md', report);
            console.error(failures.join('\n'));
            process.exitCode = 1;
          }
          NODE

      - name: Create or update runtime asset health issue
        if: ${{ always() && steps.verify.outcome == 'failure' }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs');
            const title = 'Runtime release assets health check failed';
            const body = fs.readFileSync('runtime-assets-health-report.md', 'utf8');
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100,
            });
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
                state: 'open',
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({ owner, repo, title, body });
              core.info(`Created issue #${created.data.number}`);
            }

      - name: Fail unhealthy check
        if: ${{ always() && steps.verify.outcome == 'failure' }}
        run: exit 1
