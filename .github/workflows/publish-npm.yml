# Publish the mixdog package to npm on version tags (v0.9.9, v1.0.0, ...).
# Idempotent: skips publish when the tag's version already exists on the
# registry, so re-runs and backfilled tags never fail. workflow_dispatch
# allows publishing an already-pushed tag retroactively.
# Requires the NPM_TOKEN repo secret (npm automation token).

name: Publish npm

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (e.g. v0.9.9)"
        required: true

permissions:
  contents: write # release creation
  id-token: write # npm --provenance

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [[ "v${PKG_VER}" != "$TAG" ]]; then
            echo "::error::tag $TAG does not match package.json version ${PKG_VER}"
            exit 1
          fi

      - name: Skip if version already on npm
        id: gate
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")
          if npm view "mixdog@${PKG_VER}" version >/dev/null 2>&1; then
            echo "mixdog@${PKG_VER} already published — skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        if: steps.gate.outputs.publish == 'true'
        run: npm ci

      # src/tui/dist is gitignored; smoke imports it. prepack rebuilds it
      # again at publish time, but the smoke gate needs it present first.
      - name: Build TUI
        if: steps.gate.outputs.publish == 'true'
        run: npm run build:tui

      - name: Smoke
        if: steps.gate.outputs.publish == 'true'
        run: npm run smoke

      - name: Publish
        if: steps.gate.outputs.publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Keep GitHub releases in sync with published versions — tags were
      # piling up without releases (last release v0.7.18 vs tag v0.9.9).
      # Runs even when npm publish was skipped so backfilled tags still get
      # a release page; make_latest tracks the newest published tag.
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          make_latest: true
