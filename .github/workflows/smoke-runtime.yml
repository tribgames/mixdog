## Phase C: negative-path tests against the released runtime tarballs.
## Runs after Build Runtime succeeds, OR on demand. Validates fetcher behavior
## under corrupt/missing/stale conditions on each OS.

name: Smoke Runtime (negative paths)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag override (leave blank to use the bundled manifest)"
        required: false
        default: ""
      release_repository:
        description: "Release repository override (e.g. owner/repository)"
        required: false
        default: ""
  workflow_run:
    workflows: ["Build Runtime"]
    types: [completed]

permissions:
  contents: read

jobs:
  negative:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: negative-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,  arch: x64,   runner: ubuntu-22.04, container: 'ubuntu:20.04' }
          - { os: darwin, arch: arm64, runner: macos-14,     container: '' }
          - { os: win32,  arch: x64,   runner: windows-2022, container: '' }

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Resolve runtime release tag
        id: runtime
        shell: bash
        env:
          TAG_OVERRIDE: ${{ inputs.tag }}
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from 'node:fs';

          const manifest = JSON.parse(
            readFileSync('src/runtime/memory/data/runtime-manifest.json', 'utf8')
          );
          const tag = process.env.TAG_OVERRIDE || manifest.release_tag;
          if (typeof tag !== 'string' || tag.length === 0) {
            throw new Error('No workflow tag override or bundled manifest release_tag');
          }
          appendFileSync(process.env.GITHUB_OUTPUT, `tag=${tag}\n`);
          console.log(`Testing runtime release tag: ${tag}`);
          NODE

      - name: Negative tests (unix)
        if: runner.os != 'Windows'
        env:
          TAG: ${{ steps.runtime.outputs.tag }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
          RUNTIME_RELEASE_REPOSITORY: ${{ inputs.release_repository }}
        run: bash scripts/smoke-runtime-negative.sh

      - name: Negative tests (windows)
        if: runner.os == 'Windows'
        env:
          TAG: ${{ steps.runtime.outputs.tag }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
          RUNTIME_RELEASE_REPOSITORY: ${{ inputs.release_repository }}
        shell: pwsh
        run: .\scripts\smoke-runtime-negative.ps1
